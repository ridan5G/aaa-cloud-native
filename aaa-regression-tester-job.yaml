apiVersion: batch/v1
kind: Job
metadata:
  name: aaa-regression-tester
  namespace: aaa-platform
  labels:
    app.kubernetes.io/name: aaa-regression-tester
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aaa-regression-tester
    spec:
      restartPolicy: Never
      containers:
        - name: regression-tester
          image: "aaa/aaa-regression-tester:dev"
          imagePullPolicy: Never
          env:
            - name: PROVISION_URL
              value: "http://aaa-platform-subscriber-profile-api:8080/v1"
            - name: LOOKUP_URL
              value: "http://aaa-platform-aaa-lookup-service:8081/v1"
            - name: PUSHGATEWAY_URL
              value: "http://aaa-platform-prometheus-pushgateway:9091"
            - name: TEST_JWT
              valueFrom:
                secretKeyRef:
                  name: aaa-test-jwt
                  key: token
            - name: RADIUS_HOST
              value: "aaa-platform-aaa-radius-server"
            - name: RADIUS_PORT
              value: "1812"
            - name: RADIUS_SECRET
              valueFrom:
                secretKeyRef:
                  name: aaa-radius-secret
                  key: radius-secret
            - name: DB_URL
              value: "postgres://aaa_app:devpassword@aaa-postgres-pooler-rw:5432/aaa"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: results
              mountPath: /app/results
      volumes:
        - name: results
          emptyDir: {}
