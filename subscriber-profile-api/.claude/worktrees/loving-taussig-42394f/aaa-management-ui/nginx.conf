server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — avoids CORS and hides the backend URL from the browser.
    # In Kubernetes the ConfigMap overrides this with the ClusterIP service name.
    location /v1/ {
        proxy_pass http://subscriber-profile-api:8080/v1/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout   120s;  # bulk jobs can take time
    }

    # Nginx stub_status — scraped by the nginx-prometheus-exporter sidecar
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    # Health check endpoint for liveness probe
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
