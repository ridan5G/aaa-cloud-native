apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aaa-lookup-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-lookup-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aaa-lookup-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aaa-lookup-service.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- if .Values.affinity.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                {{- include "aaa-lookup-service.selectorLabels" . | nindent 16 }}
            topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: aaa-lookup-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: {{ .Values.service.httpPort | quote }}
            - name: METRICS_PORT
              value: {{ .Values.service.metricsPort | quote }}
            - name: THREAD_COUNT
              value: {{ .Values.tuning.threadCount | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: PROVISIONING_URL
              value: {{ .Values.provisioningUrl | quote }}
            # Read-only replica credentials — never connects to primary
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName }}
                  key: host-ro
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName }}
                  key: database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName }}
                  key: password
            - name: DB_POOL_SIZE
              value: {{ .Values.db.poolSize | quote }}
            - name: DB_TIMEOUT_SEC
              value: {{ .Values.db.timeoutSec | quote }}
            # JWT
            - name: JWT_SKIP_VERIFY
              value: {{ .Values.jwt.skipVerify | quote }}
            {{- if and .Values.jwt.secretName (ne .Values.jwt.skipVerify "true") }}
            # Mount secret as file; code reads the path via JWT_PUBLIC_KEY_PATH
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/jwt/public.key
            {{- end }}
          volumeMounts:
            {{- if and .Values.jwt.secretName (ne .Values.jwt.skipVerify "true") }}
            - name: jwt-public-key
              mountPath: /etc/jwt
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/db
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if and .Values.jwt.secretName (ne .Values.jwt.skipVerify "true") }}
        - name: jwt-public-key
          secret:
            secretName: {{ .Values.jwt.secretName }}
            items:
              - key: public-key
                path: public.key
        {{- end }}
