{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "aaa-lookup-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-lookup-service.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "aaa-lookup-service.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
{{- end }}
