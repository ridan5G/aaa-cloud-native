{{- if .Values.monitoring.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aaa-management-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-management-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aaa-management-ui.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from the ingress controller (browser-facing HTTP)
    - ports:
        - port: 80
          protocol: TCP
    # Allow Prometheus scraping of nginx-exporter metrics port
    - ports:
        - port: {{ .Values.service.metricsPort }}
          protocol: TCP
{{- else }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aaa-management-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-management-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aaa-management-ui.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from the ingress controller (browser-facing HTTP)
    - ports:
        - port: 80
          protocol: TCP
{{- end }}
