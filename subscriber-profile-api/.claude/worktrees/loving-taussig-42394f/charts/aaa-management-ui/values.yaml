# ── Replica count ───────────────────────────────────────────────
replicaCount: 2

# ── Image ───────────────────────────────────────────────────────
image:
  repository: ""          # REQUIRED — set per environment
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Service ─────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  metricsPort: 9113       # nginx-prometheus-exporter default port

# ── Ingress ─────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: ui.aaa-platform.example.com
  tls:
    enabled: true
    secretName: aaa-ui-tls

# ── Runtime config — injected as window.APP_CONFIG via /config.js ──
appConfig:
  apiBaseUrl: "/v1"   # relative → same-origin; UI nginx proxies /v1/ to the API ClusterIP
  oidcAuthority: "https://auth.example.com/realms/aaa"
  oidcClientId: "aaa-management-ui"

# ── API backend for nginx proxy_pass ────────────────────────────
# Should match the subscriber-profile-api Service name inside the cluster
apiServiceName: "subscriber-profile-api"
apiServicePort: 8080

# ── Resources ───────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ── Autoscaling ─────────────────────────────────────────────────
autoscaling:
  enabled: false          # static assets; CPU-based scaling rarely needed

# ── Prometheus monitoring ────────────────────────────────────────
monitoring:
  enabled: true

nodeSelector: {}
tolerations: []

# ── Affinity ────────────────────────────────────────────────────
affinity:
  podAntiAffinity:
    enabled: false   # set true in values-ha.yaml to spread pods across nodes

# ── Pod Disruption Budget ───────────────────────────────────────
podDisruptionBudget:
  minAvailable: 1

# ── Helm name overrides ─────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""
