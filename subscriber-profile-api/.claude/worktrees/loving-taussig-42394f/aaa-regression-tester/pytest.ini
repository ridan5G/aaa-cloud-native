[pytest]
# Sequential execution — modules must run in order 01 → 13 (01b runs after 01)
# Do NOT use -n (xdist parallel) for the full suite; only within test_11 workers.
addopts =
    -v
    --tb=short
    --timeout=60
    --junitxml=results.xml
    -m "not slow and not migration and not noauth"

asyncio_mode = auto

# Collect only test_NN_*.py files in order
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: mark test as slow (performance suite, test_11)
    migration: mark test as requiring pre-loaded migration data (test_09)
    smoke: mark a subset as a quick smoke check
    radius: mark test as requiring aaa-radius-server (skipped if server unreachable)
    noauth: mark test as requiring real JWT auth (skip when JWT_SKIP_VERIFY=true in dev)
    order: set explicit execution order for test classes (used by test_21)
