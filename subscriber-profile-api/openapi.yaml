openapi: 3.1.0
info:
  title: subscriber-profile-api
  description: 'Provisioning REST API for the AAA cloud-native platform. Manages SIM profiles,

    IMSIs, IP pools, routing domains, and IMSI/ICCID range configurations, and

    exposes async bulk import/release/delete jobs. Used by operators, BSS/OSS

    systems, the management UI, and `aaa-radius-server` (first-connection

    fallback). Auth is OAuth 2.0 client_credentials Bearer JWT.'
  contact:
    name: AAA Platform Team
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Liveness
      operationId: liveness_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/db:
    get:
      tags:
      - health
      summary: Readiness
      operationId: readiness_health_db_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/routing-domains:
    post:
      tags:
      - routing-domains
      summary: Create Routing Domain
      operationId: create_routing_domain_v1_routing_domains_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoutingDomainCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - routing-domains
      summary: List Routing Domains
      operationId: list_routing_domains_v1_routing_domains_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/routing-domains/{domain_id}:
