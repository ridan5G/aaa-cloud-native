            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/routing-domains/{domain_id}/suggest-cidr:
    get:
      tags:
      - routing-domains
      summary: Suggest Cidr
      description: 'Find the smallest available CIDR block in this routing domain that provides

        at least `size` usable host IPs and does not overlap any existing pool.


        Requires at least one entry in the domain''s `allowed_prefixes` to define

        the search space (returns 422 if allowed_prefixes is empty).'
      operationId: suggest_cidr_v1_routing_domains__domain_id__suggest_cidr_get
      parameters:
      - name: domain_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Domain Id
      - name: size
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          description: Minimum number of usable host IPs required
          title: Size
        description: Minimum number of usable host IPs required
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
