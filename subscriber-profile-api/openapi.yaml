      parameters:
      - name: domain_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Domain Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - routing-domains
      summary: Patch Routing Domain
      operationId: patch_routing_domain_v1_routing_domains__domain_id__patch
      parameters:
      - name: domain_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Domain Id
