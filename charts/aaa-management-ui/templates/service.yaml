apiVersion: v1
kind: Service
metadata:
  name: {{ include "aaa-management-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-management-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "aaa-management-ui.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.monitoring.enabled }}
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
