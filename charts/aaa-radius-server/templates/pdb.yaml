apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aaa-radius-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-radius-server.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "aaa-radius-server.selectorLabels" . | nindent 6 }}
