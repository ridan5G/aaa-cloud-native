replicaCount: 2

image:
  repository: ""          # REQUIRED — set per environment
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 1812
  protocol: UDP
  metricsPort: 9090    # TCP port for Prometheus /metrics (prometheus-cpp Exposer)

# RADIUS shared secret — stored in a Kubernetes Secret.
# Either set radiusSecret.value directly (dev only) or provide a secretRef.
radiusSecret:
  value: "testing123"     # plaintext — use secretRef in production
  secretName: ""          # if set, overrides value; secret must have key: radius-secret

# aaa-lookup-service URLs — primary (required) and secondary (optional).
# When lookupUrlSecondary is set, the radius server retries on it if the
# primary is unreachable (transport/curl error).  Business-logic responses
# (200/403/404/503) from the primary are always treated as final.
lookupUrl: "http://aaa-lookup-service:8081/v1"
lookupUrlSecondary: ""   # e.g. "http://aaa-lookup-service-secondary:8081/v1"

# Worker thread count — tune based on expected request rate and HTTP call latency
workerThreads: 8

logLevel: "info"           # trace | debug | info | warn | error

resources:
  requests:
    cpu: "200m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

nameOverride: ""
fullnameOverride: ""

# ── Affinity ────────────────────────────────────────────────────
affinity:
  podAntiAffinity:
    enabled: false   # set true in values-ha.yaml to spread pods across nodes

# ── Pod Disruption Budget ───────────────────────────────────────
podDisruptionBudget:
  minAvailable: 1

# ── Prometheus monitoring ────────────────────────────────────────
monitoring:
  enabled: true

# ── Packet capture (dev/debug) ──────────────────────────────────
# Enable with:  make deploy radiusPCAP=true
#
# When enabled a tcpdump sidecar is added to the radius-server pod. It captures
# all traffic continuously, rotating the file at fileSizeLimitMB so the PVC
# never fills.  Retrieve with: make pcap-get-radius
pcap:
  enabled: false
  # Any image with tcpdump + /bin/sh works; corfr/tcpdump is Alpine-based (~6 MB).
  image: "corfr/tcpdump"
  # BPF filter passed verbatim to tcpdump.  Leave empty to capture everything.
  # Example: "udp port 1812"
  filter: ""
  # tcpdump -C: rotate capture file at this many MB (-W 1 keeps only the latest).
  fileSizeLimitMB: 10
  # PVC size — should be comfortably larger than fileSizeLimitMB.
  storageSize: "50Mi"
