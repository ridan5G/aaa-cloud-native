# ── Replica count ───────────────────────────────────────────────
replicaCount: 3

# ── Image ───────────────────────────────────────────────────────
image:
  repository: ""          # REQUIRED — set per environment
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Service ─────────────────────────────────────────────────────
service:
  type: ClusterIP
  httpPort: 8081
  metricsPort: 9090

# ── Ingress ─────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: lookup.aaa.example.com
  tls:
    enabled: true
    secretName: ""

# ── Database ────────────────────────────────────────────────────
# Name of the Secret created by charts/aaa-database.
# Must contain key: uri-ro (read-only PgBouncer URI)
db:
  secretName: aaa-db-credentials
  poolSize: 8         # server-side connections per replica pod
  timeoutSec: "1.0"   # query-start deadline in seconds

# ── Upstream services ───────────────────────────────────────────
# subscriber-profile-api base URL (in-cluster) — called on DB-miss for first-connection
provisioningUrl: "http://subscriber-profile-api:8080"

# ── Performance tuning ──────────────────────────────────────────
tuning:
  threadCount: 0      # 0 = auto (one thread per logical CPU)

# ── JWT ─────────────────────────────────────────────────────────
jwt:
  # Set to "true" in dev/test to bypass JWT verification
  skipVerify: "false"
  # Name of a Secret with key "public-key" (RS256 PEM).
  # Ignored when skipVerify=true.
  secretName: ""

# ── Observability ───────────────────────────────────────────────
logLevel: "info"      # trace | debug | info | warn | error

# ── Resources ───────────────────────────────────────────────────
resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

# ── Autoscaling ─────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# ── Pod Disruption Budget ───────────────────────────────────────
podDisruptionBudget:
  minAvailable: 2

# ── Prometheus monitoring ────────────────────────────────────────
monitoring:
  enabled: true

# ── Helm name overrides ─────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""
