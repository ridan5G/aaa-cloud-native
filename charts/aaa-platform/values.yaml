# ══════════════════════════════════════════════════════════════════
# aaa-platform — production defaults
# All sub-charts enabled; regression tester off by default.
# Override per environment via values-dev.yaml or values-oci.yaml.
# ══════════════════════════════════════════════════════════════════

createNamespace: true

# ── Database ─────────────────────────────────────────────────────
aaa-database:
  enabled: true
  postgresql:
    instances: 3
    storage:
      size: 50Gi
      storageClass: ""
    appPassword: ""        # REQUIRED — override in env-specific values
    appCredentialsSecretName: aaa-db-credentials
  pgbouncer:
    rw:
      instances: 2
    ro:
      instances: 2

# ── AAA Lookup Service ────────────────────────────────────────────
aaa-lookup-service:
  enabled: true
  replicaCount: 3
  image:
    repository: ""         # REQUIRED
    tag: "latest"
  db:
    secretName: aaa-db-credentials
  jwt:
    skipVerify: "false"
  provisioningUrl: "http://subscriber-profile-api:8080"   # override per release name in env values
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
  podDisruptionBudget:
    minAvailable: 2
  ingress:
    enabled: false

# ── Provisioning API ─────────────────────────────────────────────
subscriber-profile-api:
  enabled: true
  replicaCount: 2
  image:
    repository: ""         # REQUIRED
    tag: "latest"
  db:
    secretName: aaa-db-credentials
  jwt:
    skipVerify: "false"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  podDisruptionBudget:
    minAvailable: 1
  ingress:
    enabled: false

# ── Management UI ────────────────────────────────────────────────────
aaa-management-ui:
  enabled: true
  replicaCount: 2
  image:
    repository: ""         # REQUIRED
    tag: "latest"
  ingress:
    enabled: false
  appConfig:
    apiBaseUrl: "https://provisioning.aaa-platform.example.com/v1"
    oidcAuthority: "https://auth.example.com/realms/aaa"
    oidcClientId: "aaa-management-ui"
  apiServiceName: "subscriber-profile-api"
  apiServicePort: 8080
  monitoring:
    enabled: true

# ── Observability stack ───────────────────────────────────────────────
kube-prometheus-stack:
  enabled: true

  grafana:
    enabled: true
    # REQUIRED in production — set via CI secret or:
    #   helm upgrade ... --set kube-prometheus-stack.grafana.adminPassword=<pw>
    # For k8s-secret-based management use:
    #   admin:
    #     existingSecret: grafana-admin-secret
    #     userKey: admin-user
    #     passwordKey: admin-password
    adminPassword: ""

    # ── Home dashboard ────────────────────────────────────────────────────
    # The sidecar writes provisioned dashboards to /tmp/dashboards/<folder>/.
    # Setting default_home_dashboard_path makes Grafana open the AAA Platform
    # dashboard instead of the built-in Grafana home page after every redeploy.
    grafana.ini:
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/AAA Platform/aaa-platform-dashboard.json

    # ── Sidecar ──────────────────────────────────────────────────────────
    # Dashboard sidecar: watches ConfigMaps labelled grafana_dashboard=1 and
    # hot-loads them.  The umbrella chart creates grafana-dashboard-cm.yaml
    # with exactly this label so the AAA Platform dashboard auto-provisions.
    #
    # Datasource sidecar: defaultDatasourceEnabled=false suppresses the
    # kube-prometheus-stack built-in "Prometheus" ConfigMap whose URL is derived
    # from the Helm release name and is therefore always wrong for our setup.
    # We provision all datasources ourselves via grafana.datasources below.
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        # ALL = watch every namespace; restrict to a single namespace in prod
        # if RBAC is locked down (e.g. searchNamespace: aaa-platform)
        searchNamespace: ALL
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: true
      datasources:
        # Prevent kube-prometheus-stack from creating its own Prometheus
        # datasource ConfigMap (it points to the wrong service hostname).
        # Our grafana.datasources block below is the single source of truth.
        defaultDatasourceEnabled: false

    # ── Datasources ───────────────────────────────────────────────────────
    # Full ownership of datasource provisioning.
    # "prometheus-operated" is the headless service the Prometheus Operator
    # always creates, regardless of Helm release/chart naming conventions.
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            uid: prometheus
            type: prometheus
            # Short-form: Grafana and Prometheus are always co-located in the
            # same namespace by this chart, so the namespace suffix is optional.
            url: http://prometheus-operated:9090
            isDefault: true
            access: proxy
            jsonData:
              timeInterval: 15s
              httpMethod: POST
          - name: Alertmanager
            uid: alertmanager
            type: alertmanager
            # alertmanager-operated is created by the Prometheus Operator (analogous
            # to prometheus-operated) whenever Alertmanager replicas > 0.
            url: http://alertmanager-operated:9093
            access: proxy
            jsonData:
              handleGrafanaManagedAlerts: false
              implementation: prometheus

    persistence:
      enabled: true
      size: 5Gi

  # ── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    prometheusSpec:
      retention: 30d
      # Allow ServiceMonitors and PodMonitors created outside the Helm release
      # to be scraped (required for our per-chart ServiceMonitor resources)
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    # ── Routing → external Zabbix ────────────────────────────────────
    # All alerts are forwarded to the in-cluster bridge
    # (alertmanagerZabbixWebhook below) which translates Alertmanager
    # webhook payloads into the Zabbix trapper protocol.
    config:
      route:
        receiver: zabbix
        group_by: [alertname, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - matchers:
              - severity="critical"
            receiver: zabbix
            repeat_interval: 1h
      receivers:
        - name: zabbix
          webhook_configs:
            - url: http://aaa-zabbix-bridge:10052/alerts
              send_resolved: true

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

prometheus-pushgateway:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: ""   # default is "monitoring" — empty → Release.Namespace

# ── Alertmanager → Zabbix bridge ──────────────────────────────────────
# In-cluster sidecar that receives Alertmanager webhooks and forwards them
# to an external Zabbix server via zabbix_sender protocol.
# Connection coords (server host/port + Zabbix target host) come from the
# Secret named below — create it out-of-band:
#   kubectl create secret generic aaa-zabbix-bridge-credentials \
#     --from-literal=ZABBIX_SERVER_HOST=zabbix.ops.example.com \
#     --from-literal=ZABBIX_SERVER_PORT=10051 \
#     --from-literal=ZABBIX_TARGET_HOST=aaa-cloud-native-prod \
#     -n <release-namespace>
alertmanagerZabbixWebhook:
  enabled: true            # prod: forward alerts to Zabbix
  secretName: aaa-zabbix-bridge-credentials
  image:
    repository: gmauleon/alertmanager-zabbix-webhook
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 10052
  config:
    keysPrefix: prometheus.alert
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Migration — triggered manually; disabled by default ──────────────
aaa-migration:
  enabled: false

# ── Regression Tester — off by default; triggered by CI or make test ──
aaa-regression-tester:
  enabled: false
  image:
    repository: ""         # REQUIRED when enabled
    tag: "latest"
  env:
    PROVISION_URL: "http://subscriber-profile-api:8080/v1"
    LOOKUP_URL: "http://aaa-lookup-service:8081/v1"
    PUSHGATEWAY_URL: "http://prometheus-pushgateway:9091"
  jwtSecretName: aaa-test-jwt

nameOverride: ""
fullnameOverride: ""
