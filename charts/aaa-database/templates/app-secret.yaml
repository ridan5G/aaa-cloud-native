{{/*
App credentials Secret.

Created only when postgresql.appPassword is provided directly in values.
If you manage credentials externally (Vault, SealedSecrets, ESO), set
  postgresql.existingAppSecret: <your-secret-name>
and this template will be skipped — the cluster.yaml bootstrap will
reference your pre-created secret instead.

Keys written:
  username   — PostgreSQL app user (aaa_app)
  password   — app user password
  database   — database name (aaa)
  host-rw    — PgBouncer RW service (primary; writes + first-connection)
  host-ro    — PgBouncer RO service (standby replicas; lookups)
  port       — always 5432 (PgBouncer listens on the standard port)
  uri-rw     — full postgres:// URI for PRIMARY_URL (subscriber-profile-api)
  uri-ro     — full postgres:// URI for REPLICA_URL  (aaa-lookup-service)
*/}}
{{- if not .Values.postgresql.existingAppSecret }}
{{- if not .Values.postgresql.appPassword }}
{{- fail "Either postgresql.appPassword or postgresql.existingAppSecret must be set. Use --set postgresql.appPassword=<secret> or provide a values override." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgresql.appCredentialsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-database.labels" . | nindent 4 }}
  annotations:
    # Retain this secret on helm uninstall so app services don't break
    # during a chart upgrade cycle. Remove annotation to allow deletion.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  username: {{ .Values.postgresql.appUser | quote }}
  password: {{ .Values.postgresql.appPassword | quote }}
  database: {{ .Values.postgresql.database | quote }}
  host-rw: {{ include "aaa-database.poolerRWName" . | quote }}
  {{- if .Values.pgbouncer.ro.enabled }}
  host-ro: {{ include "aaa-database.poolerROName" . | quote }}
  {{- else }}
  host-ro: {{ include "aaa-database.poolerRWName" . | quote }}
  {{- end }}
  port: "5432"
  uri-rw: {{ printf "postgres://%s:%s@%s:5432/%s"
               .Values.postgresql.appUser
               .Values.postgresql.appPassword
               (include "aaa-database.poolerRWName" .)
               .Values.postgresql.database | quote }}
  {{- if .Values.pgbouncer.ro.enabled }}
  uri-ro: {{ printf "postgres://%s:%s@%s:5432/%s"
               .Values.postgresql.appUser
               .Values.postgresql.appPassword
               (include "aaa-database.poolerROName" .)
               .Values.postgresql.database | quote }}
  {{- else }}
  uri-ro: {{ printf "postgres://%s:%s@%s:5432/%s"
               .Values.postgresql.appUser
               .Values.postgresql.appPassword
               (include "aaa-database.poolerRWName" .)
               .Values.postgresql.database | quote }}
  {{- end }}
{{- end }}
