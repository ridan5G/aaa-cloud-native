{{/*
Helm hook Job — runs on every helm install / helm upgrade.

Execution order:
  1. db-migrate-configmap.yaml (hook-weight=0) — ConfigMap is created first
  2. db-migrate-job.yaml       (hook-weight=1) — Job runs after ConfigMap exists

Steps inside the Job:
  a. migrate.sql  — drop stale tables, column migrations, Gen-4, DEFAULT PRIVILEGES
  b. schema.sql   — CREATE TABLE IF NOT EXISTS for all 11 tables, indexes, triggers, grants

Connects directly to the CNPG primary service using the superuser secret
auto-created by CloudNativePG ({clusterName}-superuser).
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aaa-database.clusterName" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-database.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: db-migrate
        {{- include "aaa-database.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.postgresql.imageName | quote }}
          env:
            - name: PGHOST
              value: {{ printf "%s-rw" (include "aaa-database.clusterName" .) | quote }}
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-superuser" (include "aaa-database.clusterName" .) | quote }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-superuser" (include "aaa-database.clusterName" .) | quote }}
                  key: password
          command:
            - sh
            - -euc
            - |
              echo "=== AAA DB Migrate: waiting for primary to accept connections ==="
              until pg_isready -q; do
                echo "  waiting for ${PGHOST}:${PGPORT}..."
                sleep 3
              done
              echo "=== Applying migrate.sql ==="
              psql -v ON_ERROR_STOP=1 -f /migrate/migrate.sql
              echo "=== Applying schema.sql ==="
              psql -v ON_ERROR_STOP=1 -f /schema/schema.sql
              echo "=== Migration complete ==="
          volumeMounts:
            - name: migrate-sql
              mountPath: /migrate
            - name: schema-sql
              mountPath: /schema
      volumes:
        - name: migrate-sql
          configMap:
            name: {{ printf "%s-migrate-sql" (include "aaa-database.clusterName" .) | quote }}
        - name: schema-sql
          configMap:
            name: {{ printf "%s-initdb-sql" (include "aaa-database.clusterName" .) | quote }}
