# ── Image ───────────────────────────────────────────────────────
image:
  repository: ""          # REQUIRED — set per environment
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Service URLs ────────────────────────────────────────────────
env:
  PROVISION_URL: "http://subscriber-profile-api:8080/v1"
  LOOKUP_URL: "http://aaa-lookup-service:8081/v1"
  PUSHGATEWAY_URL: "http://prometheus-pushgateway:9091"
  # DB_URL is used by conftest.py to flush all profile data before the test run.
  # Points at PgBouncer (pooler) — same credentials as the API.
  DB_URL: "postgres://aaa_app:devpassword@aaa-postgres-pooler-rw:5432/aaa"

# ── JWT token ────────────────────────────────────────────────────
# Name of a pre-existing Secret with key "token"
jwtSecretName: "aaa-test-jwt"

# ── RADIUS server ─────────────────────────────────────────────────────────────
# Leave host empty ("") to skip RADIUS tests — the suite auto-skips if unreachable.
# When set, secretName must reference a K8s Secret with key "radius-secret" that
# contains the same shared secret as the aaa-radius-server deployment.
radius:
  host: ""              # e.g. "aaa-radius-server" (in-cluster Service name)
  port: 1812
  secretName: ""        # required when host is non-empty; must have key: radius-secret

# ── Job settings ─────────────────────────────────────────────────
job:
  # Fail immediately — no retries. A single failed test is a failed suite.
  backoffLimit: 0
  # Auto-delete the Job 1 hour after completion (pass or fail)
  ttlSecondsAfterFinished: 3600

# ── Resources ────────────────────────────────────────────────────
resources:
  requests:
    cpu: "500m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

# ── Packet capture (dev/debug) ──────────────────────────────────
# Enable with:  make test PCAP=true
#
# When enabled a tcpdump sidecar is added to the test pod. It captures all
# traffic on every interface for the lifetime of the test run and writes
# /captures/test.pcap (shared emptyDir). Retrieve with: make pcap-get
pcap:
  enabled: false
  # Any image with tcpdump + /bin/sh works; corfr/tcpdump is Alpine-based (~6 MB).
  image: "corfr/tcpdump"
  # BPF filter passed verbatim to tcpdump.  Leave empty to capture everything.
  # Example: "port 8080 or port 8081 or udp port 1812"
  filter: ""
  # PVC size for the capture file.  A full test run is typically 5–50 MB.
  storageSize: "512Mi"

# ── Helm name overrides ─────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""
