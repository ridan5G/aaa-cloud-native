apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aaa-regression-tester.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aaa-regression-tester.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "aaa-regression-tester.selectorLabels" . | nindent 8 }}
      annotations:
        # Metrics are pushed to Pushgateway — no scrape needed on the pod
        prometheus.io/scrape: "false"
    spec:
      restartPolicy: Never
      serviceAccountName: {{ if .Values.rbac.create }}{{ include "aaa-regression-tester.fullname" . }}{{ else }}default{{ end }}
      containers:
        - name: regression-tester
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Default CMD in the Dockerfile runs run_all.sh (full suite).
          # When pcap is enabled the command is wrapped to write a sentinel
          # file (/captures/done) so the tcpdump sidecar can exit cleanly.
          {{- if .Values.pcap.enabled }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              bash /app/run_all.sh
              RC=$?
              touch /captures/done
              exit $RC
          {{- end }}
          env:
            - name: PROVISION_URL
              value: {{ .Values.env.PROVISION_URL | quote }}
            - name: LOOKUP_URL
              value: {{ .Values.env.LOOKUP_URL | quote }}
            - name: PUSHGATEWAY_URL
              value: {{ .Values.env.PUSHGATEWAY_URL | quote }}
            - name: TEST_JWT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwtSecretName }}
                  key: token
            - name: RADIUS_HOST
              value: {{ .Values.radius.host | quote }}
            - name: RADIUS_PORT
              value: {{ .Values.radius.port | quote }}
            {{- if .Values.radius.secretName }}
            - name: RADIUS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.radius.secretName }}
                  key: radius-secret
            {{- end }}
            - name: DB_URL
              value: {{ .Values.env.DB_URL | quote }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: results
              mountPath: /app/results
            {{- if .Values.pcap.enabled }}
            - name: captures
              mountPath: /captures
            {{- end }}

        {{- if .Values.pcap.enabled }}
        # ── tcpdump sidecar ────────────────────────────────────────────────────
        # Captures all pod network traffic to /captures/test.pcap.
        # Exits cleanly once the regression-tester container touches /captures/done.
        # Retrieve the file after the Job with: make pcap-get
        - name: tcpdump
          image: {{ .Values.pcap.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["NET_RAW", "NET_ADMIN"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[pcap] Starting capture on all interfaces..."
              tcpdump -i any -n -s 0 -w /captures/test.pcap {{ .Values.pcap.filter }} &
              TCPDUMP_PID=$!
              echo "[pcap] tcpdump PID=${TCPDUMP_PID} — waiting for tests to finish..."
              until [ -f /captures/done ]; do sleep 2; done
              echo "[pcap] Sentinel detected — flushing and stopping capture..."
              kill -SIGTERM "${TCPDUMP_PID}"
              wait "${TCPDUMP_PID}" 2>/dev/null || true
              FSIZE=$(du -sh /captures/test.pcap 2>/dev/null | cut -f1)
              echo "[pcap] Saved /captures/test.pcap (${FSIZE:-unknown size})"
              echo "[pcap] Retrieve with: kubectl cp <namespace>/<pod>:/captures/test.pcap ./test.pcap"
          volumeMounts:
            - name: captures
              mountPath: /captures
        {{- end }}

      volumes:
        # JUnit XML and timing CSV are written here.
        # Retrieve with: kubectl cp <pod>:/app/results ./results -n <namespace>
        - name: results
          emptyDir: {}
        {{- if .Values.pcap.enabled }}
        # Backed by a PVC so the file survives pod completion and can be
        # retrieved with: make pcap-get  (kubectl cp from a helper pod)
        - name: captures
          persistentVolumeClaim:
            claimName: {{ include "aaa-regression-tester.fullname" . }}-pcap
        {{- end }}
