# Local test stack for running regression outside k3d.
# Usage:
#   cp .env.example .env  # then edit .env for your environment
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml run --rm tester
#   docker compose -f docker-compose.test.yml down --volumes

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-aaa}
      POSTGRES_USER:     ${DB_USER:-aaa_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aaa_app} -d ${DB_NAME:-aaa}"]
      interval: 3s
      retries: 10

  subscriber-profile-api:
    image: ${REGISTRY:-k3d-aaa-registry.localhost:5111}/subscriber-profile-api:${TAG:-dev}
    environment:
      PRIMARY_URL:  "postgres://${DB_USER:-aaa_app}:${DB_PASSWORD:-devpassword}@postgres:${DB_PORT:-5432}/${DB_NAME:-aaa}"
      JWT_SKIP_VERIFY: "true"
      HTTP_PORT:    "${PROVISION_HTTP_PORT:-8080}"
      METRICS_PORT: "${PROVISION_METRICS_PORT:-9091}"
    ports:
      - "${PROVISION_HTTP_PORT:-8080}:${PROVISION_HTTP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PROVISION_HTTP_PORT:-8080}/health || exit 1"]
      interval: 5s
      retries: 12

  aaa-lookup-service:
    image: ${REGISTRY:-k3d-aaa-registry.localhost:5111}/aaa-lookup-service:${TAG:-dev}
    environment:
      DB_HOST:      postgres
      DB_PORT:      "${DB_PORT:-5432}"
      DB_NAME:      "${DB_NAME:-aaa}"
      DB_USER:      "${DB_USER:-aaa_app}"
      DB_PASSWORD:  "${DB_PASSWORD:-devpassword}"
      JWT_SKIP_VERIFY: "true"
      HTTP_PORT:    "${LOOKUP_HTTP_PORT:-8081}"
      METRICS_PORT: "${LOOKUP_METRICS_PORT:-9090}"
    ports:
      - "${LOOKUP_HTTP_PORT:-8081}:${LOOKUP_HTTP_PORT:-8081}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${LOOKUP_HTTP_PORT:-8081}/health || exit 1"]
      interval: 5s
      retries: 12

  aaa-radius-server:
    image: ${REGISTRY:-k3d-aaa-registry.localhost:5111}/aaa-radius-server:${TAG:-dev}
    environment:
      RADIUS_PORT:       "${RADIUS_PORT:-1812}"
      RADIUS_SECRET:     "${RADIUS_SECRET:?RADIUS_SECRET must be set in .env}"
      LOOKUP_URL:        "http://aaa-lookup-service:${LOOKUP_HTTP_PORT:-8081}"
      PROVISIONING_URL:  "http://subscriber-profile-api:${PROVISION_HTTP_PORT:-8080}"
      WORKER_THREADS:    "${RADIUS_WORKER_THREADS:-8}"
    ports:
      - "${RADIUS_PORT:-1812}:${RADIUS_PORT:-1812}/udp"
    depends_on:
      aaa-lookup-service:
        condition: service_healthy
      subscriber-profile-api:
        condition: service_healthy

  pushgateway:
    image: prom/pushgateway:v1.8.0
    ports:
      - "${PUSHGATEWAY_PORT:-9091}:9091"

  tester:
    build: .
    environment:
      PROVISION_URL:   "http://subscriber-profile-api:${PROVISION_HTTP_PORT:-8080}/v1"
      LOOKUP_URL:      "http://aaa-lookup-service:${LOOKUP_HTTP_PORT:-8081}/v1"
      TEST_JWT:        "${TEST_JWT:-dev-skip-verify}"
      PUSHGATEWAY_URL: "http://pushgateway:9091"
      RADIUS_HOST:     "aaa-radius-server"
      RADIUS_PORT:     "${RADIUS_PORT:-1812}"
      RADIUS_SECRET:   "${RADIUS_SECRET:?RADIUS_SECRET must be set in .env}"
    depends_on:
      subscriber-profile-api:
        condition: service_healthy
      aaa-lookup-service:
        condition: service_healthy
      aaa-radius-server:
        condition: service_started
    volumes:
      - ./results:/app/results    # JUnit XML + timing CSV written here

volumes:
  pg_data:
